<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عجلة تقسيم الفرق</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: #0f1117;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    user-select: none;
  }
  h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
  .main {
    display: flex; gap: 32px; align-items: flex-start;
    flex-wrap: wrap; justify-content: center;
    width: 100%; max-width: 960px;
  }
  .wheel-section { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .wheel-wrap { position: relative; width: 320px; height: 320px; }
  canvas { border-radius: 50%; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
  .pointer {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 14px solid transparent; border-right: 14px solid transparent;
    border-top: 28px solid #FFD700;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); z-index: 10;
  }
  .current-name {
    font-size: 1.3rem; font-weight: 700;
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 12px; padding: 10px 24px;
    text-align: center; min-width: 220px; color: #e0e0e0;
  }
  .spin-btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000; border: none; border-radius: 50px;
    padding: 14px 48px; font-family: 'Cairo', sans-serif;
    font-size: 1.1rem; font-weight: 900; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 20px rgba(255,165,0,0.4);
  }
  .spin-btn:hover { transform: scale(1.04); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
  /* Result popup */
  .result-popup {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .result-popup.show { display: flex; }
  .result-card {
    border-radius: 20px; padding: 36px 56px; text-align: center;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.6); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .result-emoji  { font-size: 4rem; margin-bottom: 8px; }
  .result-team-label { font-size: 1rem; font-weight: 600; opacity: 0.85; margin-bottom: 6px; }
  .result-name   { font-size: 2rem; font-weight: 900; margin-bottom: 6px; }
  .result-desc   { font-size: 0.95rem; opacity: 0.8; }
  .result-popup .next-btn {
    background: #fff; color: #111; border: none; border-radius: 50px;
    padding: 12px 40px; font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    margin-top: 8px; transition: transform 0.1s;
  }
  .result-popup .next-btn:hover { transform: scale(1.04); }
  /* Teams */
  .teams { display: flex; flex-direction: column; gap: 16px; min-width: 240px; }
  .team-card { border-radius: 14px; padding: 16px 20px; border: 1.5px solid; }
  .team-card.red  { background: rgba(220,38,38,0.08);  border-color: rgba(220,38,38,0.35); }
  .team-card.blue { background: rgba(37,99,235,0.08);  border-color: rgba(37,99,235,0.35); }
  .team-title {
    font-size: 1rem; font-weight: 900; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .team-card.red  .team-title { color: #f87171; }
  .team-card.blue .team-title { color: #60a5fa; }
  .team-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .red-dot  { background: #ef4444; }
  .blue-dot { background: #3b82f6; }
  .team-count {
    font-size: 0.75rem; font-weight: 600;
    background: rgba(255,255,255,0.07);
    border-radius: 20px; padding: 2px 10px; margin-right: auto;
  }
  .member-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .member-list li {
    font-size: 0.88rem; font-weight: 600;
    padding: 5px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.05);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  /* Progress */
  .progress-bar-wrap { background: #1a1d27; border-radius: 20px; height: 6px; width: 320px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg,#FFD700,#FFA500); border-radius: 20px; transition: width 0.4s; }
  .progress-label { font-size: 0.78rem; color: #888; margin-top: -8px; }
  /* Reset */
  .reset-btn {
    background: transparent; border: 1px solid #333; color: #888;
    border-radius: 50px; padding: 8px 24px;
    font-family: 'Cairo', sans-serif; font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .reset-btn:hover { border-color: #666; color: #ccc; }
  .done-banner {
    display: none;
    background: linear-gradient(135deg, #1a1d27, #23263a);
    border: 1.5px solid #FFD700; border-radius: 16px;
    padding: 20px 32px; text-align: center;
    font-size: 1.1rem; font-weight: 700; color: #FFD700;
    margin-top: 8px; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  /* History panel */
  .history-panel {
    background: #1a1d27; border: 1px solid #2a2d3a;
    border-radius: 14px; padding: 16px 20px;
    min-width: 240px; max-width: 260px;
  }
  .history-title {
    font-size: 0.9rem; font-weight: 800; color: #FFD700;
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .history-list { list-style: none; display: flex; flex-direction: column; gap: 5px; max-height: 340px; overflow-y: auto; }
  .history-list li {
    font-size: 0.8rem; font-weight: 600; padding: 4px 8px;
    border-radius: 6px; display: flex; align-items: center; gap: 6px;
  }
  .history-list li .h-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .history-list li.h-red  { background: rgba(220,38,38,0.1);  color: #fca5a5; }
  .history-list li.h-blue { background: rgba(37,99,235,0.1);  color: #93c5fd; }
  .history-list li.h-red  .h-dot { background: #ef4444; }
  .history-list li.h-blue .h-dot { background: #3b82f6; }
  .history-empty { font-size: 0.78rem; color: #555; text-align: center; padding: 12px 0; }
  /* PIN Modal */
  .pin-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    align-items: center; justify-content: center;
  }
  .pin-overlay.show { display: flex; }
  .pin-modal {
    background: #1a1d27; border: 1.5px solid #333;
    border-radius: 20px; padding: 32px 28px;
    text-align: center; width: 280px;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .pin-modal h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; }
  .pin-modal p  { font-size: 0.82rem; color: #888; margin-bottom: 20px; }
  .pin-input {
    width: 100%; background: #0f1117;
    border: 1.5px solid #333; border-radius: 10px;
    color: #fff; font-family: 'Cairo', sans-serif;
    font-size: 1.5rem; font-weight: 700;
    text-align: center; padding: 10px; letter-spacing: 8px;
    outline: none; margin-bottom: 16px;
  }
  .pin-input:focus { border-color: #FFD700; }
  .pin-error { color: #f87171; font-size: 0.82rem; margin-bottom: 12px; min-height: 18px; }
  .pin-btns { display: flex; gap: 10px; justify-content: center; }
  .pin-confirm {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #000; border: none; border-radius: 50px;
    padding: 10px 28px; font-family: 'Cairo', sans-serif;
    font-size: 0.95rem; font-weight: 800; cursor: pointer;
  }
  .pin-cancel {
    background: transparent; color: #888; border: 1px solid #333;
    border-radius: 50px; padding: 10px 20px;
    font-family: 'Cairo', sans-serif; font-size: 0.95rem; cursor: pointer;
  }
</style>
</head>
<body>

<h1>🎡 عجلة تقسيم الفرق</h1>
<p class="subtitle">كل شخص يلف العجلة — النتيجة تحدد فريقه</p>

<div class="main">

  <!-- Wheel -->
  <div class="wheel-section">
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheel" width="320" height="320"></canvas>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">لسه مفيش حد لف</div>
    <div class="current-name" id="currentName">اختار أول شخص يلف 👇</div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 لف العجلة</button>
    <button class="reset-btn" onclick="resetAll()">🔄 إعادة البداية</button>
    <div class="done-banner" id="doneBanner">🎉 اتقسمتوا! الفرق جاهزة</div>
  </div>

  <!-- PIN Modal -->
  <div class="pin-overlay" id="pinOverlay">
    <div class="pin-modal">
      <h3>🔐 إدخل الـ PIN</h3>
      <p>بس المسؤول يقدر يعيد من الأول</p>
      <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••" />
      <div class="pin-error" id="pinError"></div>
      <div class="pin-btns">
        <button class="pin-confirm" onclick="confirmPin()">تأكيد</button>
        <button class="pin-cancel" onclick="closePinModal()">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- Teams -->
  <div class="teams">
    <div class="team-card red">
      <div class="team-title">
        <span class="team-dot red-dot"></span>
        الفريق الأحمر 🔴
        <span class="team-count" id="redCount">0 / 7</span>
      </div>
      <ul class="member-list" id="redList"></ul>
    </div>
    <div class="team-card blue">
      <div class="team-title">
        <span class="team-dot blue-dot"></span>
        الفريق الأزرق 🔵
        <span class="team-count" id="blueCount">0 / 6</span>
      </div>
      <ul class="member-list" id="blueList"></ul>
    </div>
  </div>

  <!-- History -->
  <div class="history-panel">
    <div class="history-title">📋 سجل النتائج</div>
    <ul class="history-list" id="historyList">
      <li class="history-empty" id="historyEmpty">لسه مفيش نتائج</li>
    </ul>
  </div>

</div>

<!-- Result popup -->
<div class="result-popup" id="resultPopup">
  <div class="result-card" id="resultCard">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-team-label" id="resultTeamLabel"></div>
    <div class="result-name" id="resultName"></div>
    <div class="result-desc" id="resultDesc"></div>
  </div>
  <button class="next-btn" onclick="closeResult()">التالي ▶</button>
</div>

<script>
const NAMES = [
  "مي مسعد","عبدالحميد السيد","عبدالرحمن اشرف","سلوى السيد","شيرين جمال",
  "أحمد السعيد","منة العربي","شيماء مكرم","احمد سعيد","محمد بلال",
  "آلاء نبيل","عمر حافظ","ندى احمد"
];

const TEAM_COLORS = {
  red:  { bg:"#DC2626", emoji:"🔴", label:"الفريق الأحمر", desc:"قوة وشجاعة" },
  blue: { bg:"#2563EB", emoji:"🔵", label:"الفريق الأزرق", desc:"ثقة وتماسك" }
};

const ADMIN_PIN = '2516';
const STORAGE_KEY = 'spinwheel_state';

// ---- State ----
let assignments = {};
let order = [];
let spunIndex = 0;
let spinning = false;
let history = []; // [{name, team}]

// ---- Persist ----
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ assignments, order, spunIndex, history }));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    if (!s.assignments || !s.order || s.order.length !== NAMES.length) return false;
    assignments = s.assignments;
    order = s.order;
    spunIndex = s.spunIndex || 0;
    history = s.history || [];
    return true;
  } catch(e) { return false; }
}

// ---- Shuffle ----
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildAssignments() {
  const shuffled = shuffle(NAMES);
  assignments = {};
  shuffled.forEach((name, i) => { assignments[name] = i < 7 ? 'red' : 'blue'; });
  order = shuffle(NAMES);
  spunIndex = 0;
  history = [];
}

// ---- Canvas ----
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, CX = W/2, CY = H/2, R = W/2 - 8;
const SEG_COLORS = ['#DC2626','#1D4ED8','#EF4444','#2563EB','#F87171','#3B82F6','#B91C1C','#1E40AF','#DC2626','#2563EB','#EF4444','#3B82F6','#DC2626'];
const N_SEGS = 13;
const SEG_ANGLE = (2 * Math.PI) / N_SEGS;
let currentAngle = 0;

function drawWheel(rotAngle) {
  ctx.clearRect(0,0,W,H);
  for (let i = 0; i < N_SEGS; i++) {
    const start = rotAngle + i * SEG_ANGLE;
    const end   = start + SEG_ANGLE;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = SEG_COLORS[i];
    ctx.fill();
    ctx.strokeStyle = '#0f1117';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + SEG_ANGLE / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Cairo';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = 3;
    const label = order[i] ? order[i].split(' ')[0] : '';
    ctx.fillText(label, R - 10, 4);
    ctx.restore();
  }
  ctx.beginPath();
  ctx.arc(CX, CY, 28, 0, 2*Math.PI);
  ctx.fillStyle = '#0f1117';
  ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 18px Cairo';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🎡', CX, CY);
}

// ---- History UI ----
function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  list.innerHTML = '';
  if (history.length === 0) {
    const li = document.createElement('li');
    li.className = 'history-empty';
    li.id = 'historyEmpty';
    li.textContent = 'لسه مفيش نتائج';
    list.appendChild(li);
    return;
  }
  history.forEach((entry, idx) => {
    const li = document.createElement('li');
    li.className = entry.team === 'red' ? 'h-red' : 'h-blue';
    li.innerHTML = `<span class="h-dot"></span>${idx+1}. ${entry.name}`;
    list.appendChild(li);
  });
}

// ---- Teams UI ----
function renderTeams() {
  const redList  = document.getElementById('redList');
  const blueList = document.getElementById('blueList');
  redList.innerHTML  = '';
  blueList.innerHTML = '';
  history.forEach(entry => {
    const li = document.createElement('li');
    li.textContent = entry.name;
    li.style.color = entry.team === 'red' ? '#fca5a5' : '#93c5fd';
    (entry.team === 'red' ? redList : blueList).appendChild(li);
  });
  document.getElementById('redCount').textContent  = history.filter(h=>h.team==='red').length  + ' / 7';
  document.getElementById('blueCount').textContent = history.filter(h=>h.team==='blue').length + ' / 6';
}

// ---- Progress ----
function updateProgress() {
  const total = NAMES.length;
  const done  = spunIndex;
  document.getElementById('progressFill').style.width = (done/total*100) + '%';
  document.getElementById('progressLabel').textContent = done === 0 ? 'لسه مفيش حد لف' : `${done} من ${total} لفوا`;
  if (spunIndex < total) {
    document.getElementById('currentName').textContent = `الجاي: ${order[spunIndex]}`;
    document.getElementById('spinBtn').disabled = false;
  } else {
    document.getElementById('currentName').textContent = '✅ الكل لف!';
    document.getElementById('spinBtn').disabled = true;
    document.getElementById('doneBanner').style.display = 'block';
  }
  renderTeams();
  renderHistory();
}

// ---- Spin ----
function spin() {
  if (spinning || spunIndex >= NAMES.length) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  const person = order[spunIndex];
  const team   = assignments[person];
  const extraSpins  = 5 + Math.floor(Math.random() * 4);
  const targetAngle = currentAngle + extraSpins * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration    = 3500;
  const startTime   = performance.now();
  const startAngle  = currentAngle;
  function animate(now) {
    const t    = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    currentAngle = startAngle + (targetAngle - startAngle) * ease;
    drawWheel(currentAngle);
    if (t < 1) { requestAnimationFrame(animate); }
    else {
      currentAngle = targetAngle;
      spinning = false;
      showResult(person, team);
    }
  }
  requestAnimationFrame(animate);
}

// ---- Result popup ----
function showResult(name, team) {
  const t    = TEAM_COLORS[team];
  const card = document.getElementById('resultCard');
  card.style.background = team === 'red'
    ? 'linear-gradient(135deg, #450a0a, #7f1d1d)'
    : 'linear-gradient(135deg, #0c1445, #1e3a8a)';
  card.style.border = `2.5px solid ${t.bg}`;
  document.getElementById('resultEmoji').textContent     = t.emoji;
  document.getElementById('resultTeamLabel').textContent = t.label;
  document.getElementById('resultTeamLabel').style.color = '#fff';
  document.getElementById('resultName').textContent      = name;
  document.getElementById('resultDesc').textContent      = t.desc;
  document.getElementById('resultPopup').classList.add('show');
  // Save to history
  history.push({ name, team });
  spunIndex++;
  saveState();
  updateProgress();
}

function closeResult() {
  document.getElementById('resultPopup').classList.remove('show');
  if (spunIndex < NAMES.length) document.getElementById('spinBtn').disabled = false;
}

// ---- PIN / Reset ----
function resetAll() {
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinOverlay').classList.add('show');
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}

function closePinModal() {
  document.getElementById('pinOverlay').classList.remove('show');
}

function confirmPin() {
  const entered = document.getElementById('pinInput').value.trim();
  if (entered !== ADMIN_PIN) {
    document.getElementById('pinError').textContent = '❌ PIN غلط، حاول تاني';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
    return;
  }
  closePinModal();
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  buildAssignments();
  saveState();
  currentAngle = 0;
  document.getElementById('doneBanner').style.display = 'none';
  document.getElementById('resultPopup').classList.remove('show');
  drawWheel(0);
  updateProgress();
}

document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmPin();
});

// ---- Init ----
const loaded = loadState();
if (!loaded) buildAssignments();
drawWheel(0);
updateProgress();
</script>
</body>
</html>
